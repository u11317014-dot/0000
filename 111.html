<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>顛覆直覺播音器</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f0f2f5; }
        .player-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        h3 { text-align: center; color: #333; }
        
        .section { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #555; }

        /* 連續控制樣式 (原本是離散按鈕) */
        input[type="range"] { width: 100%; cursor: pointer; }

        /* 離散控制樣式 (原本是連續滑桿) */
        .btn-group { display: flex; gap: 5px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: 1px solid #ddd; background: #fff; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #e9ecef; }
        button.active { background: #007bff; color: white; border-color: #007bff; }
    </style>
</head>
<body>

<div class="player-card">
    <h3>反直覺播音器</h3>

    <div class="section">
        <label>播放與進度控制 (滑動來操作)</label>
        <input type="range" id="progressSlider" value="0" min="0" max="100" step="0.1">
        <div style="display: flex; justify-content: space-between; font-size: 12px; margin-top: 5px;">
            <span>停止</span>
            <span>播放中 / 進度跳轉</span>
        </div>
    </div>

    <div class="section">
        <label>音量切換 (離散按鈕)</label>
        <div class="btn-group">
            <button onclick="setVolume(0, this)">靜音</button>
            <button onclick="setVolume(0.5, this)" class="active">適中</button>
            <button onclick="setVolume(1, this)">爆棚</button>
        </div>
    </div>

    <audio id="myAudio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    
    <p id="status" style="font-size: 13px; color: #888; text-align: center;">狀態：停止</p>
</div>

<script>
    const audio = document.getElementById('myAudio');
    const slider = document.getElementById('progressSlider');
    const statusText = document.getElementById('status');

    // 處理「離散行為」的「連續化」
    slider.addEventListener('input', () => {
        if (audio.paused) {
            audio.play();
        }
        
        // 將拉桿百分比轉換為音軌秒數
        const seekTo = (slider.value / 100) * audio.duration;
        if (!isNaN(seekTo)) {
            audio.currentTime = seekTo;
        }
