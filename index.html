<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>反直覺播音器 - 音源強化版</title>
    <style>
        :root {
            --primary: #f43f5e;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .player-card {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 { margin-bottom: 2rem; font-weight: 600; text-align: center; color: var(--primary); }

        .control-group { margin-bottom: 2.5rem; }

        label {
            display: block;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- 連續控制：播放/進度 --- */
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #334155;
            height: 10px;
            border-radius: 10px;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 50%;
            border: 4px solid #fff;
            box-shadow: 0 0 15px rgba(244, 63, 94, 0.6);
        }

        /* --- 離散控制：音量按鈕 --- */
        .discrete-box {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .volume-btn {
            background: #334155;
            border: none;
            color: #cbd5e1;
            padding: 12px 0;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .volume-btn.active {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        #status {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #22c55e;
            text-align: center;
            min-height: 1.2em;
        }

        .
