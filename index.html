<audio id="audioEngine" preload="auto">
    <source src="https://actions.google.com/sounds/v1/ambient/creaky_door_spooky_mystery.ogg" type="audio/ogg">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    您的瀏覽器不支援音訊播放。
</audio>

<script>
    const audio = document.getElementById('audioEngine');
    const slider = document.getElementById('seekSlider');
    const status = document.getElementById('status');

    // 增加一個檢查，確保音檔載入成功
    audio.addEventListener('canplaythrough', () => {
        console.log("音檔已就緒");
        status.innerText = "系統就緒，請滑動拉桿開始播放";
    });

    audio.addEventListener('error', (e) => {
        console.error("音檔載入失敗", e);
        status.innerText = "音源載入失敗，請檢查網路或更換連結";
        status.style.color = "#ef4444";
    });

    // 連續控制邏輯
    slider.addEventListener('input', () => {
        if (audio.paused) {
            // 嘗試播放，捕捉瀏覽器可能的封鎖錯誤
            audio.play().catch(err => {
                status.innerText = "請先點擊頁面任何地方以允許播放";
            });
        }
        
        if (audio.duration) {
            const targetTime = (slider.value / 100) * audio.duration;
            audio.currentTime = targetTime;
            status.innerText = `播放中: ${Math.floor(slider.value)}%`;
        }
    });

    // ... 其餘邏輯保持不變 ...
</script>
